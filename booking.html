<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>

<link rel="stylesheet" href="style.css">

<style>

.container{
    width:90%;
    max-width:700px;
    margin:50px auto;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#8B0000;
    margin-bottom:20px;
}

input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#25D366;
    color:white;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#128C7E;
}

</style>

</head>
<body>

<div class="container">

<h1 id="pujaName"></h1>

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="phone" placeholder="Mobile Number" required>

<input type="date" id="date">

<textarea id="address" placeholder="Address"></textarea>

<textarea id="note" placeholder="Special Note"></textarea>

<button onclick="bookNow()">
Book Appointment
</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const puja = params.get("puja");

document.getElementById("pujaName").innerHTML="🪔 "+puja;
document.getElementById("name").value = localStorage.getItem("userName") || "";

document.getElementById("phone").value = localStorage.getItem("userPhone") || "";


const astrology = params.get("astrology");

document.getElementById("pujaName").innerHTML = "🪔 " +astrology;

document.getElementById("name").value = localStorage.getItem("userName") || "";
document.getElementById("phone").value = localStorage.getItem("userPhone") || "";

function bookNow(){

let name=document.getElementById("name").value;

let phone=document.getElementById("phone").value;

let date=document.getElementById("date").value;

let address=document.getElementById("address").value;

let note=document.getElementById("note").value;

if(name=="" || phone==""){

alert("Please fill Name and Phone Number");

return;

}

let message=
`🙏 Jai Ambe Pooja Jyotish

Hello Pandit Devendra Maharaj,

Name : ${name}

Phone : ${phone}

Puja : ${puja}

Date : ${date}

Address : ${address}

Note : ${note}

Please contact me.

Thank You.`;

let whatsapp="https://wa.me/919723963216?text="+encodeURIComponent(message);

window.open(whatsapp,"_blank");

}

</script>

</body>
</html>
